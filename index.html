<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidNest Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  :root {
    --bg:      #0a0a0f;
    --surface: #111118;
    --border:  #1e1e2e;
    --accent:  #7c6aff;
    --accent2: #a78bfa;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --ok:      #4ade80;
    --err:     #f87171;
    --warn:    #fb923c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

  /* ── Header ── */
  header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  header svg { width:28px; height:28px; flex-shrink:0; }
  header h1 { font-size:1.1rem; font-weight:700; letter-spacing:.5px; color:var(--accent2); }
  header span { font-size:.75rem; color:var(--muted); margin-left:auto; }

  /* ── Layout ── */
  .wrap { display:grid; grid-template-columns:1fr 320px; gap:0; height:calc(100vh - 57px); }
  @media(max-width:820px){ .wrap{ grid-template-columns:1fr; grid-template-rows:auto 1fr; } }

  /* ── Player side ── */
  .player-side { display:flex; flex-direction:column; padding:20px; gap:16px; overflow-y:auto; }

  /* URL bar */
  .url-bar { display:flex; gap:8px; }
  .url-bar input { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:10px 14px; border-radius:8px; font-size:.85rem; font-family:monospace; outline:none; }
  .url-bar input:focus { border-color:var(--accent); }
  .url-bar button { background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:10px 18px; font-size:.85rem; font-weight:600; cursor:pointer; white-space:nowrap; }
  .url-bar button:hover { background:var(--accent2); }

  /* Video */
  .video-wrap { position:relative; background:#000; border-radius:12px; overflow:hidden;
    aspect-ratio:16/9; width:100%; }
  video { width:100%; height:100%; display:block; }
  .video-overlay { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px; pointer-events:none; }
  .video-overlay.hidden { display:none; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent);
    border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to{ transform:rotate(360deg); } }
  .overlay-msg { font-size:.8rem; color:var(--muted); }

  /* Status bar */
  .status-bar { font-size:.75rem; color:var(--muted); padding:6px 2px; display:flex; gap:12px; flex-wrap:wrap; }
  .status-bar b { color:var(--accent2); }
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:4px; }
  .dot.ok  { background:var(--ok); }
  .dot.err { background:var(--err); }
  .dot.warn{ background:var(--warn); }

  /* ── Source panel ── */
  .source-panel { border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  @media(max-width:820px){ .source-panel{ border-left:none; border-top:1px solid var(--border); max-height:45vh; } }

  .panel-head { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .panel-head h2 { font-size:.85rem; font-weight:700; color:var(--text); }
  .panel-head .badge { margin-left:auto; background:var(--accent); color:#fff;
    font-size:.65rem; font-weight:700; border-radius:20px; padding:2px 8px; }

  /* Fetch bar */
  .fetch-bar { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:8px; }
  .fetch-row { display:flex; gap:6px; }
  .fetch-row input { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:8px 10px; border-radius:7px; font-size:.8rem; outline:none; }
  .fetch-row input:focus { border-color:var(--accent); }
  .fetch-row select { background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:8px 8px; border-radius:7px; font-size:.8rem; outline:none; }
  .fetch-row button { background:var(--accent); color:#fff; border:none; border-radius:7px;
    padding:8px 14px; font-size:.8rem; font-weight:600; cursor:pointer; }
  .fetch-row button:hover { background:var(--accent2); }
  .ep-row { display:flex; gap:6px; }
  .ep-row input { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:7px 10px; border-radius:7px; font-size:.78rem; outline:none; }

  /* Stream list */
  .stream-list { flex:1; overflow-y:auto; padding:10px 8px; display:flex; flex-direction:column; gap:4px; }
  .stream-list:empty::after { content:"No streams loaded."; display:block; text-align:center;
    color:var(--muted); font-size:.78rem; padding:30px 0; }

  .server-group { margin-bottom:6px; }
  .server-label { font-size:.68rem; font-weight:700; color:var(--muted); text-transform:uppercase;
    letter-spacing:1px; padding:6px 8px 4px; }

  .stream-item { display:flex; align-items:center; gap:6px; padding:7px 8px; border-radius:7px;
    cursor:pointer; border:1px solid transparent; transition:all .15s; }
  .stream-item:hover  { background:var(--surface); border-color:var(--border); }
  .stream-item.active { background:#1a1535; border-color:var(--accent); }
  .stream-item .type-tag { font-size:.62rem; font-weight:700; border-radius:4px; padding:2px 6px;
    white-space:nowrap; flex-shrink:0; }
  .type-tag.hls  { background:#2a1f0a; color:var(--warn); }
  .type-tag.mp4  { background:#0a2a14; color:var(--ok); }
  .type-tag.dash { background:#0a1f2a; color:#38bdf8; }
  .stream-item .stream-url-text { font-size:.68rem; color:var(--muted); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .stream-item.active .stream-url-text { color:var(--accent2); }
  .stream-item .play-icon { flex-shrink:0; color:var(--accent); font-size:.8rem; opacity:0; }
  .stream-item:hover .play-icon, .stream-item.active .play-icon { opacity:1; }

  /* fetch status */
  .fetch-status { font-size:.72rem; padding:6px 14px; color:var(--muted); min-height:22px; }
  .fetch-status.ok   { color:var(--ok); }
  .fetch-status.err  { color:var(--err); }
  .fetch-status.warn { color:var(--warn); }

  /* scrollbar */
  ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<header>
  <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="14" cy="14" r="13" fill="#1a1535" stroke="#7c6aff" stroke-width="1.5"/>
    <polygon points="11,9 21,14 11,19" fill="#a78bfa"/>
  </svg>
  <h1>VidNest Player</h1>
  <span id="hdr-status">idle</span>
</header>

<div class="wrap">

  <!-- Left: player -->
  <div class="player-side">
    <div class="url-bar">
      <input id="manualUrl" placeholder="Paste a stream URL manually (m3u8 / mp4)…" />
      <button onclick="playManual()">Play</button>
    </div>

    <div class="video-wrap">
      <video id="vid" controls></video>
      <div class="video-overlay" id="overlay">
        <div class="spinner" id="spinner" style="display:none"></div>
        <div class="overlay-msg" id="overlayMsg">Select a stream from the panel →</div>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      <span><span class="dot warn"></span>No stream loaded</span>
    </div>
  </div>

  <!-- Right: source panel -->
  <div class="source-panel">
    <div class="panel-head">
      <h2>Streams</h2>
      <span class="badge" id="totalBadge">0</span>
    </div>

    <div class="fetch-bar">
      <div class="fetch-row">
        <input id="tmdbId" type="number" placeholder="TMDB ID" value="280" style="width:90px;flex:none"/>
        <select id="mtype">
          <option value="movie">Movie</option>
          <option value="tv">TV</option>
        </select>
        <button onclick="fetchStreams()">Fetch</button>
      </div>
      <div class="ep-row" id="epRow" style="display:none">
        <input id="season"  type="number" placeholder="Season"  value="1"/>
        <input id="episode" type="number" placeholder="Episode" value="1"/>
      </div>
    </div>

    <div class="fetch-status" id="fetchStatus">Enter a TMDB ID and click Fetch.</div>
    <div class="stream-list" id="streamList"></div>
  </div>
</div>

<script>
const API_BASE = "https://srtfile.github.io/vidnest/";
const CORS_PROXIES = [
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];
let hls = null;
let activeItem = null;

// ── Try each CORS proxy until one returns valid JSON ──────────────
async function fetchWithProxy(targetUrl) {
  for(const wrap of CORS_PROXIES) {
    try {
      const res = await fetch(wrap(targetUrl), { signal: AbortSignal.timeout(20000) });
      if(!res.ok) continue;
      const text = await res.text();
      // Must start with { — skip HTML error pages
      const trimmed = text.trimStart();
      if(!trimmed.startsWith("{") && !trimmed.startsWith("[")) continue;
      return JSON.parse(trimmed);
    } catch { continue; }
  }
  throw new Error("All CORS proxies failed");
}

// ── Show/hide episode row ─────────────────────────────────────────
document.getElementById("mtype").addEventListener("change", function(){
  document.getElementById("epRow").style.display = this.value==="tv" ? "flex" : "none";
});

// ── Fetch from API ────────────────────────────────────────────────
async function fetchStreams() {
  const tmdb   = document.getElementById("tmdbId").value.trim();
  const mtype  = document.getElementById("mtype").value;
  const season = document.getElementById("season").value || "1";
  const ep     = document.getElementById("episode").value || "1";
  if(!tmdb){ setFetchStatus("Enter a TMDB ID first.", "err"); return; }

  const route = mtype==="movie" ? `/movie/${tmdb}` : `/tv/${tmdb}/${season}/${ep}`;
  const url   = `${API_BASE}?r=${encodeURIComponent(route)}`;

  setFetchStatus("Fetching streams…", "warn");
  document.getElementById("streamList").innerHTML = "";
  document.getElementById("totalBadge").textContent = "0";
  document.getElementById("hdr-status").textContent = "fetching…";

  try {
    const data = await fetchWithProxy(url);

    if(data.status !== "ok") {
      setFetchStatus(`Error: ${data.error || "unknown"}`, "err");
      document.getElementById("hdr-status").textContent = "error";
      return;
    }

    const servers = data.servers || [];
    const total   = data.total   || 0;

    if(!servers.length || total===0) {
      setFetchStatus("No streams found.", "err");
      document.getElementById("hdr-status").textContent = "no results";
      return;
    }

    renderStreamList(servers);
    document.getElementById("totalBadge").textContent = total;
    setFetchStatus(`✓ ${total} stream(s) across ${servers.length} server(s)`, "ok");
    document.getElementById("hdr-status").textContent = `${total} streams`;

  } catch(e) {
    setFetchStatus(`Fetch failed: ${e.message}`, "err");
    document.getElementById("hdr-status").textContent = "error";
  }
}

// ── Render stream list ────────────────────────────────────────────
function renderStreamList(servers) {
  const list = document.getElementById("streamList");
  list.innerHTML = "";

  servers.forEach(srv => {
    const group = document.createElement("div");
    group.className = "server-group";

    const label = document.createElement("div");
    label.className = "server-label";
    label.textContent = srv.server;
    group.appendChild(label);

    (srv.streams || []).forEach(s => {
      const item = document.createElement("div");
      item.className = "stream-item";
      item.innerHTML = `
        <span class="type-tag ${s.type}">${s.type.toUpperCase()}</span>
        <span class="stream-url-text" title="${s.url}">${s.url}</span>
        <span class="play-icon">▶</span>`;
      item.addEventListener("click", () => playStream(s.url, s.type, item));
      group.appendChild(item);
    });

    list.appendChild(group);
  });
}

// ── Play a stream ─────────────────────────────────────────────────
function playStream(url, type, itemEl) {
  if(activeItem) activeItem.classList.remove("active");
  activeItem = itemEl;
  if(itemEl) itemEl.classList.add("active");

  document.getElementById("manualUrl").value = url;
  loadVideo(url, type);
}

function playManual() {
  const url = document.getElementById("manualUrl").value.trim();
  if(!url){ return; }
  const type = url.toLowerCase().split("?")[0].endsWith(".mp4") ? "mp4"
             : url.toLowerCase().split("?")[0].endsWith(".mpd") ? "dash"
             : "hls";
  if(activeItem) activeItem.classList.remove("active");
  activeItem = null;
  loadVideo(url, type);
}

function loadVideo(url, type) {
  const vid = document.getElementById("vid");
  showOverlay(true, "Loading…");
  setStatus("warn", `Loading ${type.toUpperCase()}…`, url);

  // Destroy previous HLS instance
  if(hls){ hls.destroy(); hls=null; }

  if(type === "mp4" || type === "webm" || type === "dash") {
    vid.src = url;
    vid.play().catch(()=>{});
    vid.oncanplay = () => { showOverlay(false); setStatus("ok", `Playing ${type.toUpperCase()}`, url); };
    vid.onerror   = () => { showOverlay(false); setStatus("err", "Playback error", url); };
    return;
  }

  // HLS
  if(Hls.isSupported()) {
    hls = new Hls({ enableWorker:true, lowLatencyMode:false });
    hls.loadSource(url);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      vid.play().catch(()=>{});
      showOverlay(false);
      setStatus("ok", "Playing HLS", url);
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if(data.fatal){
        showOverlay(false);
        setStatus("err", `HLS error: ${data.details}`, url);
      }
    });
  } else if(vid.canPlayType("application/vnd.apple.mpegurl")) {
    // Safari native HLS
    vid.src = url;
    vid.play().catch(()=>{});
    vid.oncanplay = () => { showOverlay(false); setStatus("ok", "Playing HLS (native)", url); };
  } else {
    showOverlay(false);
    setStatus("err", "HLS not supported in this browser", url);
  }
}

// ── UI helpers ────────────────────────────────────────────────────
function showOverlay(show, msg="") {
  const ov = document.getElementById("overlay");
  const sp = document.getElementById("spinner");
  const om = document.getElementById("overlayMsg");
  ov.classList.toggle("hidden", !show);
  sp.style.display  = show ? "block" : "none";
  om.textContent    = msg;
}

function setStatus(type, label, url="") {
  const bar = document.getElementById("statusBar");
  const dotCls = type==="ok"?"ok":type==="err"?"err":"warn";
  const short  = url.length>60 ? url.slice(0,57)+"…" : url;
  bar.innerHTML = `<span><span class="dot ${dotCls}"></span>${label}</span>`
                + (url ? `<span style="color:var(--muted);font-size:.7rem;word-break:break-all">${short}</span>` : "");
}

function setFetchStatus(msg, cls="") {
  const el = document.getElementById("fetchStatus");
  el.textContent  = msg;
  el.className    = `fetch-status ${cls}`;
}

// ── Auto-fetch if tmdb param in URL ──────────────────────────────
(function autoLoad(){
  const p = new URLSearchParams(window.location.search);
  const tmdb = p.get("tmdb") || p.get("id");
  if(tmdb){
    document.getElementById("tmdbId").value = tmdb;
    if(p.get("type")==="tv"){
      document.getElementById("mtype").value = "tv";
      document.getElementById("epRow").style.display = "flex";
      if(p.get("season"))  document.getElementById("season").value  = p.get("season");
      if(p.get("episode")) document.getElementById("episode").value = p.get("episode");
    }
    fetchStreams();
  }
})();
</script>
</body>
</html>
